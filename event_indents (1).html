document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"2841362c-89f3-42ef-823c-4e82ec0586f3\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* JDS 3.1 — Jio Design System\n * Core color + type tokens, distilled from @jds/tokens@3.0.5.\n * Use these CSS vars wherever raw <div>/inline-CSS prototypes are made.\n * Production code MUST go through @jds/react components instead.\n */\n\n@font-face {\n  font-family: \"JioType Var\";\n  src: url(\"3941c58b-0f59-4362-b4ff-f3f885c5bd7b\") format(\"woff2-variations\"),\n       url(\"3941c58b-0f59-4362-b4ff-f3f885c5bd7b\") format(\"woff2\");\n  font-weight: 400 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n:root {\n  /* ============================================================\n   * BRAND — Reliance Blue is the Jio signature.\n   * ============================================================ */\n  --reliance-base:     oklch(40.10% 0.218 264.38);   /* primary CTA, brand */\n  --reliance-light:    oklch(56.00% 0.205 264.38);   /* hover, secondary surfaces */\n  --reliance-midnight: oklch(36.00% 0.210 264.38);   /* dark mode primary */\n  --reliance-50:       oklch(96.50% 0.020 264.38);   /* tinted background */\n  --reliance-100:      oklch(91.50% 0.045 264.38);\n  --reliance-200:      oklch(83.00% 0.090 264.38);\n\n  /* ============================================================\n   * SEMANTIC / FUNCTIONAL — never use brand colors for status.\n   * ============================================================ */\n  --positive:        oklch(70.10% 0.2002 142.55);    /* success */\n  --positive-light:  oklch(94.00% 0.0700 142.55);\n  --negative:        oklch(67.06% 0.2169 23.57);     /* error */\n  --negative-light:  oklch(94.00% 0.0700 23.57);\n  --warning:         oklch(72.88% 0.171 47.42);      /* caution */\n  --warning-light:   oklch(94.00% 0.0700 47.42);\n  --informative:     oklch(66.98% 0.1827 249.22);    /* neutral info */\n  --informative-light:oklch(94.00% 0.0500 249.22);\n  --sparkle:         oklch(54.00% 0.255 295.00);     /* premium / AI */\n  --sparkle-light:   oklch(94.00% 0.0700 295.00);\n\n  /* ============================================================\n   * NEUTRALS — content / surface / stroke scale.\n   * Values approximate the JDS neutral.* family (hue ~270).\n   * ============================================================ */\n  --neutral-100: oklch(0% 0 0);\n  --neutral-200: oklch(15.93% 0.0065 270.98);  /* near-black, body text base */\n  --neutral-400: oklch(27.05% 0.0065 270.98);\n  --neutral-600: oklch(40.00% 0.0065 270.98);\n  --neutral-800: oklch(53.00% 0.0065 270.98);\n  --neutral-1000:oklch(64.00% 0.0050 270.98);  /* tertiary text, icons */\n  --neutral-1200:oklch(75.00% 0.0035 270.98);\n  --neutral-1400:oklch(85.00% 0.0025 270.98);  /* heavy stroke */\n  --neutral-1600:oklch(91.00% 0.0020 270.98);  /* moderate stroke */\n  --neutral-1800:oklch(94.50% 0.0018 270.98);  /* minimal stroke */\n  --neutral-2000:oklch(96.50% 0.0015 270.98);  /* subtle surface */\n  --neutral-2200:oklch(98.00% 0.0010 270.98);  /* minimal surface */\n  --neutral-2400:oklch(99.20% 0.0006 270.98);\n  --neutral-2500:oklch(100% 0 0);\n\n  /* ============================================================\n   * SEMANTIC SURFACE TOKENS (light theme — JioBase / default mode)\n   * ============================================================ */\n  /* Surfaces — backgrounds */\n  --surface-ghost:           transparent;\n  --surface-minimal:         var(--neutral-2500);   /* page bg */\n  --surface-minimal-decreased: var(--neutral-2400);\n  --surface-subtle:          var(--neutral-2200);   /* cards, list rows */\n  --surface-moderate:        var(--neutral-2000);   /* panels */\n  --surface-bold:            var(--reliance-base);\n  --surface-heavy:           var(--neutral-200);\n  --surface-contrasting:     var(--neutral-100);\n  --surface-elevated-low:    var(--neutral-2500);\n  --surface-elevated-medium: var(--neutral-2500);\n  --surface-elevated-high:   var(--neutral-2500);\n\n  /* Content — text / icons */\n  --content-heavy:    var(--neutral-200);    /* primary text */\n  --content-moderate: var(--neutral-600);    /* secondary text */\n  --content-minimal:  var(--neutral-1000);   /* tertiary text, placeholders */\n  --content-on-bold:  var(--neutral-2500);   /* text on Reliance Blue */\n\n  /* Stroke — borders / dividers */\n  --stroke-minimal:     var(--neutral-1800);\n  --stroke-moderate:    var(--neutral-1600);\n  --stroke-heavy:       var(--neutral-1400);\n  --stroke-bold:        var(--neutral-200);\n  --stroke-contrasting: var(--neutral-100);\n\n  /* ============================================================\n   * SHAPE / RADII — values pulled from spacing.fig (dimension.scale)\n   *   spacing & radius share the same f(n) scale: value = base × (n/4)\n   *   default density at S(360) uses base=16, so f(4)=16 → \"comp m / s4\".\n   * ============================================================ */\n  /* unified dimension scale (default S/360, base 16) */\n  --dim-0:    0px;\n  --dim-0_5:  2px;\n  --dim-1:    4px;\n  --dim-1_5:  6px;\n  --dim-2:    8px;\n  --dim-2_5:  10px;\n  --dim-3:    12px;\n  --dim-3_5:  14px;\n  --dim-4:    16px;\n  --dim-4_5:  18px;\n  --dim-5:    20px;\n  --dim-5_5:  22px;\n  --dim-6:    24px;\n  --dim-7:    28px;\n  --dim-8:    32px;\n  --dim-9:    36px;\n  --dim-10:   40px;\n  --dim-12:   48px;\n  --dim-14:   56px;\n  --dim-16:   64px;\n  --dim-18:   72px;\n  --dim-20:   80px;\n  --dim-24:   96px;\n  --dim-28:   112px;\n  --dim-32:   128px;\n  --dim-40:   160px;\n\n  /* radius scope aliases — map onto the dimension scale */\n  --radius-component-s:  var(--dim-1);    /* 4 — chip, small input */\n  --radius-component-m:  var(--dim-2);    /* 8 — buttons, inputs */\n  --radius-component-l:  var(--dim-3);    /* 12 — large buttons */\n  --radius-pattern-s:    var(--dim-3);    /* 12 — small cards */\n  --radius-pattern-m:    var(--dim-4);    /* 16 — default card / sheet */\n  --radius-pattern-l:    var(--dim-6);    /* 24 — hero cards */\n  --radius-layout-m:     var(--dim-6);    /* 24 — full-bleed regions */\n  --radius-layout-l:     var(--dim-8);    /* 32 — large layout region */\n  --radius-pill:         9999px;\n\n  /* ============================================================\n   * STROKE WIDTHS\n   * ============================================================ */\n  --stroke-w-floor:    1px;\n  --stroke-w-default:  1px;\n  --stroke-w-static:   1px;\n  --stroke-w-bold:     2px;\n  --stroke-w-ceiling:  3px;\n\n  /* ============================================================\n   * SPACING — three scopes (component / pattern / layout).\n   * Values shown for `default` density. Compact = ~0.75x, Open = ~1.25x.\n   * ============================================================ */\n  --space-component-xs: 2px;\n  --space-component-s:  4px;\n  --space-component-m:  8px;\n  --space-component-l:  12px;\n  --space-component-xl: 16px;\n\n  --space-pattern-xs:   8px;\n  --space-pattern-s:    12px;\n  --space-pattern-m:    16px;\n  --space-pattern-l:    20px;\n  --space-pattern-xl:   24px;\n\n  --space-layout-xs:    16px;\n  --space-layout-s:     24px;\n  --space-layout-m:     32px;\n  --space-layout-l:     48px;\n  --space-layout-xl:    64px;\n\n  /* ============================================================\n   * MOTION — keep subtle.\n   * ============================================================ */\n  --motion-reduced:    100ms;\n  --motion-discreet:   200ms;\n  --motion-expressive: 300ms;\n  --motion-easing-standard: cubic-bezier(0.2, 0, 0, 1);\n  --motion-easing-enter:    cubic-bezier(0, 0, 0, 1);\n  --motion-easing-exit:     cubic-bezier(0.3, 0, 1, 1);\n\n  /* ============================================================\n   * ELEVATION — soft, neutral, no color tint.\n   * ============================================================ */\n  --shadow-elevated-low:    0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);\n  --shadow-elevated-medium: 0 4px 8px rgba(15, 23, 42, 0.06), 0 2px 4px rgba(15, 23, 42, 0.04);\n  --shadow-elevated-high:   0 12px 24px rgba(15, 23, 42, 0.10), 0 4px 8px rgba(15, 23, 42, 0.06);\n\n  /* ============================================================\n   * TYPOGRAPHY — JioType Var (variable axis: 400–900)\n   * ============================================================ */\n  --font-sans: \"JioType Var\", system-ui, -apple-system, \"Segoe UI\", Roboto, sans-serif;\n  --font-mono: \"JetBrains Mono\", ui-monospace, SFMono-Regular, Menlo, monospace;\n\n  /* Weight tokens — direct map from JDS typography.fontweight.* */\n  --w-display:        900;\n  --w-headline:       900;\n  --w-title:          800;\n  --w-label-high:     700;\n  --w-body-high:      700;\n  --w-paragraph-high: 700;\n  --w-label-med:      500;\n  --w-body-med:       500;\n  --w-paragraph-med:  500;\n  --w-label-low:      400;\n  --w-body-low:       400;\n  --w-paragraph-low:  400;\n\n  /* Six-tier semantic type scale — values from JDS Typography.fig (S/360 viewport, base reference) */\n  --type-display-l-size: 40px;  --type-display-l-lh: 40px;\n  --type-display-m-size: 36px;  --type-display-m-lh: 36px;\n  --type-display-s-size: 32px;  --type-display-s-lh: 32px;\n  /* legacy aliases — Display defaults to L */\n  --type-display-size:   var(--type-display-l-size);\n  --type-display-lh:     1;\n  --type-display-tracking: -0.02em;\n\n  --type-headline-l-size: 28px;  --type-headline-l-lh: 28px;\n  --type-headline-m-size: 20px;  --type-headline-m-lh: 20px;\n  --type-headline-s-size: 16px;  --type-headline-s-lh: 16px;\n  /* legacy alias kept for backwards compat — maps XL → L's old size */\n  --type-headline-xl-size: 28px; --type-headline-xl-lh: 28px;\n\n  --type-title-l-size: 20px;  --type-title-l-lh: 22px;\n  --type-title-m-size: 16px;  --type-title-m-lh: 18px;\n  --type-title-s-size: 12px;  --type-title-s-lh: 14px;\n\n  --type-label-l-size: 18px;   --type-label-l-lh: 18px;\n  --type-label-m-size: 16px;   --type-label-m-lh: 16px;\n  --type-label-s-size: 14px;   --type-label-s-lh: 14px;\n  --type-label-xs-size: 12px;  --type-label-xs-lh: 12px;\n  --type-label-2xs-size: 10px; --type-label-2xs-lh: 10px;\n  --type-label-3xs-size: 8px;  --type-label-3xs-lh: 8px;\n\n  --type-body-l-size:  18px;  --type-body-l-lh:  24px;\n  --type-body-m-size:  16px;  --type-body-m-lh:  22px;\n  --type-body-s-size:  14px;  --type-body-s-lh:  20px;\n  --type-body-xs-size: 12px;  --type-body-xs-lh:  18px;\n\n  --type-paragraph-l-size: 18px; --type-paragraph-l-lh: 1.65;\n  --type-paragraph-m-size: 16px; --type-paragraph-m-lh: 1.65;\n  --type-paragraph-s-size: 14px; --type-paragraph-s-lh: 1.65;\n\n  --type-code-m-size:  16px;  --type-code-m-lh:  20px;\n  --type-code-s-size:  14px;  --type-code-s-lh:  18px;\n  --type-code-xs-size: 12px;  --type-code-xs-lh: 16px;\n  /* legacy aliases — Code defaults to S */\n  --type-code-size: var(--type-code-s-size);\n  --type-code-lh:   var(--type-code-s-lh);\n}\n\n/* ============================================================\n * Dark mode (TokenProvider value={{mode:\"dim\"}})\n * ============================================================ */\n@media (prefers-color-scheme: dark) {\n  :root[data-theme=\"auto\"], :root[data-theme=\"dim\"] {\n    --surface-minimal:    oklch(15.93% 0.0065 270.98);\n    --surface-subtle:     oklch(20.00% 0.0065 270.98);\n    --surface-moderate:   oklch(24.00% 0.0065 270.98);\n    --surface-elevated-low:    oklch(20.00% 0.0065 270.98);\n    --surface-elevated-medium: oklch(24.00% 0.0065 270.98);\n    --surface-elevated-high:   oklch(28.00% 0.0065 270.98);\n    --surface-bold:       var(--reliance-midnight);\n\n    --content-heavy:      oklch(96.50% 0.0015 270.98);\n    --content-moderate:   oklch(82.00% 0.0035 270.98);\n    --content-minimal:    oklch(64.00% 0.0050 270.98);\n\n    --stroke-minimal:     oklch(28.00% 0.0065 270.98);\n    --stroke-moderate:    oklch(34.00% 0.0065 270.98);\n    --stroke-heavy:       oklch(45.00% 0.0065 270.98);\n  }\n}\n\n/* ============================================================\n * Semantic typography helpers — analogues for h1/h2/p/code.\n * Use these in plain HTML mockups; production uses <Text> instead.\n * ============================================================ */\n\nhtml, body {\n  font-family: var(--font-sans);\n  color: var(--content-heavy);\n  background: var(--surface-minimal);\n  font-feature-settings: \"ss01\", \"tnum\"; /* tabular figures by default */\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.jds-display {\n  font-family: var(--font-sans);\n  font-weight: var(--w-display);\n  font-size: var(--type-display-size);\n  line-height: var(--type-display-lh);\n  letter-spacing: var(--type-display-tracking);\n  color: var(--content-heavy);\n}\n\n.jds-headline,    h1.jds, .jds h1 {\n  font-family: var(--font-sans);\n  font-weight: var(--w-headline);\n  font-size: var(--type-headline-l-size);\n  line-height: var(--type-headline-l-lh);\n  letter-spacing: -0.01em;\n  color: var(--content-heavy);\n}\n.jds-headline-xl { font-size: var(--type-headline-xl-size); line-height: var(--type-headline-xl-lh); }\n.jds-headline-m  { font-size: var(--type-headline-m-size);  line-height: var(--type-headline-m-lh); }\n.jds-headline-s  { font-size: var(--type-headline-s-size);  line-height: var(--type-headline-s-lh); }\n\n.jds-title,       h2.jds, .jds h2 {\n  font-family: var(--font-sans);\n  font-weight: var(--w-title);\n  font-size: var(--type-title-l-size);\n  line-height: var(--type-title-l-lh);\n  color: var(--content-heavy);\n}\n.jds-title-m { font-size: var(--type-title-m-size); line-height: var(--type-title-m-lh); }\n.jds-title-s { font-size: var(--type-title-s-size); line-height: var(--type-title-s-lh); }\n\n.jds-label {\n  font-family: var(--font-sans);\n  font-weight: var(--w-label-med);\n  font-size: var(--type-label-m-size);\n  line-height: var(--type-label-m-lh);\n  color: var(--content-moderate);\n}\n.jds-label-l { font-size: var(--type-label-l-size); line-height: var(--type-label-l-lh); }\n.jds-label-s { font-size: var(--type-label-s-size); line-height: var(--type-label-s-lh); }\n.jds-label-xs{ font-size: var(--type-label-xs-size); line-height: var(--type-label-xs-lh); }\n\n.jds-body, p.jds, .jds p {\n  font-family: var(--font-sans);\n  font-weight: var(--w-body-med);\n  font-size: var(--type-body-m-size);\n  line-height: var(--type-body-m-lh);\n  color: var(--content-heavy);\n}\n.jds-body-l { font-size: var(--type-body-l-size); line-height: var(--type-body-l-lh); }\n.jds-body-s { font-size: var(--type-body-s-size); line-height: var(--type-body-s-lh); color: var(--content-moderate); }\n\n.jds-paragraph {\n  font-family: var(--font-sans);\n  font-weight: var(--w-paragraph-med);\n  font-size: var(--type-paragraph-m-size);\n  line-height: var(--type-paragraph-m-lh);\n  color: var(--content-heavy);\n  text-wrap: pretty;\n}\n\n.jds-code, code.jds, .jds code {\n  font-family: var(--font-mono);\n  font-size: var(--type-code-size);\n  line-height: var(--type-code-lh);\n  background: var(--surface-subtle);\n  padding: 1px 6px;\n  border-radius: var(--radius-component-s);\n  color: var(--content-heavy);\n}\n\n/* Weight overrides */\n.w-low    { font-weight: 400; }\n.w-medium { font-weight: 500; }\n.w-high   { font-weight: 700; }\n.w-title  { font-weight: 800; }\n.w-display{ font-weight: 900; }\n\n/* Appearance helpers (color only) */\n.fg-primary     { color: var(--reliance-base); }\n.fg-positive    { color: var(--positive); }\n.fg-negative    { color: var(--negative); }\n.fg-warning     { color: var(--warning); }\n.fg-informative { color: var(--informative); }\n.fg-sparkle     { color: var(--sparkle); }\n.fg-heavy       { color: var(--content-heavy); }\n.fg-moderate    { color: var(--content-moderate); }\n.fg-minimal     { color: var(--content-minimal); }\n<\u002Fstyle>\n  <script src=\"a3ac3f0b-e81f-4abc-923e-3ef094d39818\"><\u002Fscript>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; }\n    html, body { margin: 0; }\n    .ei-scroll::-webkit-scrollbar { width: 8px; height: 8px; }\n    .ei-scroll::-webkit-scrollbar-thumb { background: var(--neutral-1400); border-radius: 999px; }\n    .ei-search::placeholder { color: var(--content-minimal); }\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"min-height: 100vh; background: #e8eaed; font-family: var(--font-sans); display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 24px;\">\n\n  <!-- View switcher -->\n  <div style=\"display: inline-flex; background: var(--surface-minimal); border: 1px solid var(--stroke-moderate); border-radius: var(--radius-pill); padding: 4px; gap: 4px;\">\n    <button onclick=\"{{ showDesktop }}\" style=\"{{ desktopTabStyle }}\">Desktop<\u002Fbutton>\n    <button onclick=\"{{ showMobile }}\" style=\"{{ mobileTabStyle }}\">Mobile<\u002Fbutton>\n  <\u002Fdiv>\n\n  <!-- ============ MENU (entry point) ============ -->\n  <sc-if value=\"{{ screenIsMenu }}\" hint-placeholder-val=\"{{ true }}\">\n  <div data-screen-label=\"Account Menu\" style=\"{{ menuFrameStyle }}\">\n\n    <!-- Header -->\n    <div style=\"background: #2c3e50; height: 60px; flex: none; display: flex; align-items: center; justify-content: space-between; padding: 0 20px;\">\n      <span style=\"color: #ffffff; font-weight: var(--w-title); font-size: 22px; letter-spacing: -0.01em;\">Menu<\u002Fspan>\n      <button style=\"background: transparent; border: none; padding: 4px; cursor: pointer; display: flex; color: #ffffff;\" aria-label=\"Close menu\">\n        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 5l14 14M19 5L5 19\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"ei-scroll\" style=\"flex: 1; overflow-y: auto; display: flex; flex-direction: column;\">\n\n      <!-- Profile -->\n      <div style=\"display: flex; align-items: center; gap: 16px; padding: 22px 24px 18px;\">\n        <div style=\"width: 64px; height: 64px; border-radius: var(--radius-pill); background: var(--reliance-100); display: flex; align-items: center; justify-content: center; flex: none;\">\n          <span style=\"font-weight: var(--w-title); font-size: 22px; color: var(--reliance-base);\">Tt<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display: flex; flex-direction: column; gap: 2px; min-width: 0;\">\n          <span style=\"font-weight: var(--w-title); font-size: 20px; color: var(--content-heavy); line-height: 1.2;\">TEST test<\u002Fspan>\n          <span style=\"font-size: 15px; color: var(--content-moderate); line-height: 1.35;\">Alok@gmail.com<\u002Fspan>\n          <span style=\"font-size: 15px; color: var(--content-moderate); line-height: 1.35; font-feature-settings: 'tnum';\">+91-94491-22140<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"height: 1px; background: var(--stroke-minimal); margin: 0 24px;\"><\u002Fdiv>\n\n      <!-- Menu list -->\n      <nav style=\"display: flex; flex-direction: column; padding: 8px 0;\">\n\n        <button style=\"all: unset; box-sizing: border-box; cursor: pointer; display: flex; align-items: center; gap: 18px; padding: 16px 24px;\" style-hover=\"background: var(--reliance-50);\">\n          <span style=\"color: var(--reliance-base); display: flex; flex: none;\"><svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M20.01 6.01v3h-16v-.5a2.5 2.5 0 012.5-2.5h13.5zM4.01 10.01v8h13.5a2.5 2.5 0 002.5-2.5v-5.5h-16zm12 4h-3v-1h3v1z\" fill=\"currentColor\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span style=\"display: flex; flex-direction: column; gap: 2px;\">\n            <span style=\"font-weight: var(--w-title); font-size: 19px; color: var(--content-heavy); line-height: 1.2;\">Available Balance<\u002Fspan 4px 12px; border-radius: 10px;\" style-hover=\"background: var(--reliance-50);\">\n              <span style=\"{{ item.radioStyle }}\"><sc-if value=\"{{ item.selected }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width: 11px; height: 11px; border-radius: 999px; background: var(--reliance-base);\"><\u002Fspan><\u002Fsc-if><\u002Fspan>\n              <span style=\"font-size: 16px; color: var(--content-heavy); font-feature-settings: 'tnum'; font-weight: {{ item.weight }};\">{{ item.name }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Brand sheet -->\n    <sc-if value=\"{{ brandSheetOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position: absolute; left: 0; right: 0; bottom: 0; background: var(--surface-minimal); border-radius: 20px 20px 0 0; z-index: 31; display: flex; flex-direction: column; max-height: 78%;\">\n        <div style=\"display: flex; align-items: center; justify-content: space-between; padding: 18px 20px 12px;\">\n          <span style=\"font-weight: var(--w-title); font-size: 18px; color: var(--content-heavy);\">Select brands<\u002Fspan>\n          <button onclick=\"{{ clearBrands }}\" style=\"all: unset; cursor: pointer; font-size: 14px; font-weight: var(--w-label-high); color: var(--reliance-base);\">Clear all<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"ei-scroll\" style=\"overflow-y: auto; padding: 4px 12px;\">\n          <sc-for list=\"{{ brandItems }}\" as=\"item\" hint-placeholder-count=\"3\">\n            <button onclick=\"{{ item.onToggle }}\" style=\"all: unset; box-sizing: border-box; cursor: pointer; width: 100%; display: flex; align-items: center; gap: 14px; padding: 14px 12px; border-radius: 10px;\" style-hover=\"background: var(--reliance-50);\">\n              <span style=\"{{ item.boxStyle }}\"><sc-if value=\"{{ item.selected }}\" hint-placeholder-val=\"{{ false }}\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M5 12.5l4.5 4.5L19 7\" stroke=\"#fff\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fsc-if><\u002Fspan>\n              <span style=\"font-size: 16px; color: var(--content-heavy);\">{{ item.name }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding: 14px 20px 22px; border-top: 1px solid var(--stroke-minimal);\">\n          <button onclick=\"{{ closeMenus }}\" style=\"all: unset; cursor: pointer; width: 100%; box-sizing: border-box; text-align: center; font-size: 16px; font-weight: var(--w-label-high); color: #fff; background: var(--reliance-base); padding: 14px; border-radius: var(--radius-component-m);\">Apply{{ brandCountSuffix }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1344, &quot;height&quot;: 860}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: \"menu\",   // 'menu' (entry point) | 'indents'\n    view: \"desktop\",\n    open: null,\n    sheet: null,\n    selectedEvent: \"RBLSS2026\",\n    selectedBrands: [],\n    query: \"\",\n    page: 1,            // desktop pagination\n    visibleCount: 6,    // mobile lazy-load window\n  };\n\n  PAGE_SIZE = 8;        // desktop rows per page\n  MOBILE_STEP = 6;      // mobile lazy-load increment\n\n  EVENTS = [\"RBLSS2026\",\"RBLAW2026\",\"GAPAW2026\",\"GAPSS2026\",\"MRCSS2026\",\"MRCAW2026\",\"EAMSS2026\",\"EAMAW2026\"];\n\n  // Applicable brands depend on the event-name prefix.\n  brandsForEvent(event) {\n    const prefix = (event || \"\").slice(0, 3);\n    switch (prefix) {\n      case \"RBL\": return [\"Superdry\", \"GAS\", \"La Martina\"];\n      case \"GAP\": return [\"GAP\"];\n      case \"MRC\": return [\"Mothercare\"];\n      case \"EAM\": return [\"Ed-A-Mamma\"];\n      default:    return [];\n    }\n  }\n\n  // Sample indent pool. Brand assignment is derived from the event's applicable set.\n  PEOPLE = (() => {\n    const first = [\"Arkita\",\"Bibek\",\"Ira\",\"Kedar\",\"Ananta\",\"Haimanti\",\"Suresh\",\"Meera\",\"Rohit\",\"Sneha\",\"Vikram\",\"Anjali\",\"Farhan\",\"Divya\",\"Imran\",\"Pooja\",\"Nikhil\",\"Tara\",\"Aakash\",\"Reema\",\"Manish\",\"Sana\",\"Yash\",\"Lata\",\"Karan\",\"Nisha\",\"Devansh\",\"Ritu\",\"Sahil\",\"Bhavna\"];\n    const last  = [\"Rishabh\",\"Mrinal\",\"Payal\",\"Niladri\",\"Ranjan\",\"Mihir\",\"Kalyan\",\"Joshi\",\"Sharma\",\"Verma\",\"Iyer\",\"Nair\",\"Khan\",\"Patel\",\"Reddy\",\"Bose\",\"Das\",\"Mehta\",\"Gupta\",\"Rao\"];\n    const dists = [\"Ira Payal Distribution\",\"Kedar Niladri Distribution\",\"Suresh Kalyan Distribution\"];\n    const suffix = [\"Fashion Hub\",\"Apparels\",\"Lifestyle\",\"Trends\",\"Garments\",\"Mart\"];\n    const pad = (n, w) => n.toString().padStart(w, \"0\");\n    const arr = [];\n    for (let i = 0; i < 64; i++) {\n      const name = first[i % first.length] + \" \" + last[i % last.length];\n      const role = i % 4 === 0 ? \"Distributor\" : \"Retailer\";\n      const m = pad((6200000000 + i * 73912831) % 9999999999, 10);\n      arr.push({\n        name,\n        role,\n        mobile: m.slice(0, 3) + \" \" + m.slice(3, 6) + \" \" + m.slice(6),\n        seq: (1775117000000 + i * 138472).toString(),\n        date: (i % 2 ? \"10\" : \"09\") + \"/05/2025\",\n        qty: 200 + (i * 137) % 1300,\n        mrp: 30000 + (i * 13123) % 95000,\n        uid: \"USR1\" + pad(10000 + i, 5),\n        dname: dists[i % dists.length],\n        store: last[i % last.length] + \" \" + suffix[i % suffix.length],\n      });\n    }\n    return arr;\n  })();\n\n  DIST_IDS = {\n    \"Ira Payal Distribution\":    \"DIST1021\",\n    \"Kedar Niladri Distribution\":\"DIST1044\",\n    \"Suresh Kalyan Distribution\":\"DIST1078\",\n  };\n\n  // Article catalog per brand — used to expand each indent to SKU level.\n  CATALOG = {\n    \"Superdry\": [\n      { style: \"SD-TS-1001\", code: \"SDTSH1001\", name: \"Vintage Logo Tee\",        cat: \"T-Shirts\",    fit: \"Regular\", fabric: \"Cotton\",       mrp: 1999 },\n      { style: \"SD-HD-2003\", code: \"SDHOD2003\", name: \"Code Hooded Sweatshirt\",   cat: \"Sweatshirts\", fit: \"Regular\", fabric: \"Cotton Blend\", mrp: 4499 },\n      { style: \"SD-JK-3007\", code: \"SDJKT3007\", name: \"Windcheater Jacket\",       cat: \"Jackets\",     fit: \"Slim\",    fabric: \"Nylon\",        mrp: 6999 },\n    ],\n    \"GAS\": [\n      { style: \"GAS-JN-5001\", code: \"GASJN5001\", name: \"Albert Simple Jeans\",     cat: \"Jeans\",       fit: \"Slim\",    fabric: \"Denim\",        mrp: 5499 },\n      { style: \"GAS-TS-5102\", code: \"GASTS5102\", name: \"Scuba Logo Tee\",          cat: \"T-Shirts\",    fit: \"Regular\", fabric: \"Cotton\",       mrp: 1799 },\n      { style: \"GAS-SH-5210\", code: \"GASSH5210\", name: \"Norton Shirt\",            cat: \"Shirts\",      fit: \"Slim\",    fabric: \"Cotton\",       mrp: 3299 },\n    ],\n    \"La Martina\": [\n      { style: \"LM-PL-7001\", code: \"LMPOL7001\", name: \"Guards Polo Shirt\",        cat: \"Polos\",       fit: \"Regular\", fabric: \"Pique Cotton\", mrp: 8999 },\n      { style: \"LM-SH-7110\", code: \"LMSHT7110\", name: \"Logo Sport Shirt\",         cat: \"Shirts\",      fit: \"Slim\",    fabric: \"Cotton\",       mrp: 7499 },\n      { style: \"LM-SW-7220\", code: \"LMSWT7220\", name: \"Knit Sweater\",             cat: \"Sweaters\",    fit: \"Regular\", fabric: \"Wool Blend\",   mrp: 11999 },\n    ],\n    \"GAP\": [\n      { style: \"GAP-TS-3001\", code: \"GAPTS3001\", name: \"Arch Logo Tee\",           cat: \"T-Shirts\",    fit: \"Regular\", fabric: \"Cotton\",       mrp: 1299 },\n      { style: \"GAP-HD-3105\", code: \"GAPHD3105\", name: \"Fleece Hoodie\",           cat: \"Sweatshirts\", fit: \"Regular\", fabric: \"Fleece\",       mrp: 2999 },\n      { style: \"GAP-JN-3220\", code: \"GAPJN3220\", name: \"Slim Fit Jeans\",          cat: \"Jeans\",       fit: \"Slim\",    fabric: \"Denim\",        mrp: 3499 },\n    ],\n    \"Mothercare\": [\n      { style: \"MC-BS-9001\", code: \"MCBST9001\", name: \"Cotton Bodysuit (3 Pack)\", cat: \"Bodysuits\",   fit: \"Regular\", fabric: \"Cotton\",       mrp: 1499 },\n      { style: \"MC-SL-9110\", code: \"MCSLP9110\", name: \"Sleepsuit (2 Pack)\",       cat: \"Sleepwear\",   fit: \"Regular\", fabric: \"Cotton\",       mrp: 1799 },\n      { style: \"MC-RM-9220\", code: \"MCRMP9220\", name: \"Knitted Romper\",           cat: \"Rompers\",     fit: \"Regular\", fabric: \"Cotton Knit\",  mrp: 1199 },\n    ],\n    \"Ed-A-Mamma\": [\n      { style: \"EAM-DR-4001\", code: \"EAMDR4001\", name: \"Floral Cotton Dress\",     cat: \"Dresses\",     fit: \"Regular\", fabric: \"Cotton\",         mrp: 1699 },\n      { style: \"EAM-TS-4110\", code: \"EAMTS4110\", name: \"Sustainable Graphic Tee\", cat: \"T-Shirts\",    fit: \"Regular\", fabric: \"Organic Cotton\", mrp: 899 },\n      { style: \"EAM-PJ-4220\", code: \"EAMPJ4220\", name: \"Print Pyjama Set\",        cat: \"Nightwear\",   fit: \"Regular\", fabric: \"Cotton\",         mrp: 1399 },\n    ],\n  };\n\n  EVENT_IDS = {\n    RBLSS2026: \"EVT2026011\", RBLAW2026: \"EVT2026012\",\n    GAPAW2026: \"EVT2026021\", GAPSS2026: \"EVT2026022\",\n    MRCSS2026: \"EVT2026031\", MRCAW2026: \"EVT2026032\",\n    EAMSS2026: \"EVT2026041\", EAMAW2026: \"EVT2026042\",\n  };\n\n  makeEan(seed) {\n    let h = 0;\n    for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) >>> 0;\n    return \"890\" + (h % 1000000000).toString().padStart(9, \"0\") + (h % 10);\n  }\n\n  // Expand the filtered indents into SKU-level rows for download.\n  buildSkuRows(applicableBrands, selectedBrands, selectedEvent) {\n    const COLORS = [\"Black\", \"Navy\", \"White\", \"Olive\", \"Maroon\"];\n    const out = [];\n    let gradeCounter = 0;\n    this.PEOPLE\n      .map((p, i) => ({ ...p, _i: i, brand: this.rowBrands(applicableBrands, i)[0] }))\n      .filter((p) => p.brand && selectedBrands.includes(p.brand))\n      .forEach((p) => {\n        const articles = this.CATALOG[p.brand] || [];\n        if (articles.length === 0) return;\n        const isKids = p.brand === \"Mothercare\" || p.brand === \"Ed-A-Mamma\";\n        const sizes = isKids ? [\"0-3M\", \"3-6M\", \"6-9M\", \"12-18M\", \"2-3Y\"] : [\"S\", \"M\", \"L\", \"XL\"];\n        const i = p._i;\n        const plan = [\n          { a: articles[0], color: COLORS[i % 5],       size: sizes[i % sizes.length] },\n          { a: articles[0], color: COLORS[(i + 1) % 5], size: sizes[(i + 2) % sizes.length] },\n          { a: articles[1 % articles.length], color: COLORS[(i + 2) % 5], size: sizes[(i + 1) % sizes.length] },\n          { a: articles[2 % articles.length], color: COLORS[(i + 3) % 5], size: sizes[(i + 3) % sizes.length] },\n        ];\n        const base = Math.floor(p.qty / plan.length);\n        const rem = p.qty - base * plan.length;\n        plan.forEach((v, idx) => {\n          const qty = base + (idx < rem ? 1 : 0);\n          if (qty <= 0) return;\n          const variantId = v.a.code + \"-\" + v.color.slice(0, 2).toUpperCase() + \"-\" + v.size.replace(/[^A-Za-z0-9]/g, \"\");\n          out.push({\n            \"Order Date\": p.date,\n            \"Order Id\": selectedEvent + \"_\" + p.seq,\n            \"Event Name\": selectedEvent,\n            \"Event Id\": this.EVENT_IDS[selectedEvent] || selectedEvent,\n            \"User Type\": p.role,\n            \"User Name\": p.name,\n            \"User Id\": p.uid,\n            \"Distributor Id\": this.DIST_IDS[p.dname] || \"\",\n            \"Distributor Name\": p.dname,\n            \"Brand\": p.brand,\n            \"Style Id\": v.a.style,\n            \"Article Code\": v.a.code,\n            \"Variant EAN\": this.makeEan(variantId + i + idx),\n            \"Variant Id\": variantId,\n            \"Article Name\": v.a.name,\n            \"Color\": v.color,\n            \"Size\": v.size,\n            \"Category\": v.a.cat,\n            \"Fit\": v.a.fit,\n            \"Fabric\": v.a.fabric,\n            \"MRP\": v.a.mrp,\n            \"Quantity\": qty,\n            \"Total MRP\": v.a.mrp * qty,\n            \"Grade\": [\"A\", \"B\", \"C\"][(gradeCounter++) % 3],\n            \"Store Name\": p.store,\n          });\n        });\n      });\n    return out;\n  }\n\n  toCsv(rows) {\n    const cols = [\"Order Date\",\"Order Id\",\"Event Name\",\"Event Id\",\"User Type\",\"User Name\",\"User Id\",\"Distributor Id\",\"Distributor Name\",\"Brand\",\"Style Id\",\"Article Code\",\"Variant EAN\",\"Variant Id\",\"Article Name\",\"Color\",\"Size\",\"Category\",\"Fit\",\"Fabric\",\"MRP\",\"Quantity\",\"Total MRP\",\"Grade\",\"Store Name\"];\n    const esc = (v) => '\"' + String(v == null ? \"\" : v).replace(/\"/g, '\"\"') + '\"';\n    const lines = [cols.map(esc).join(\",\")];\n    rows.forEach((r) => lines.push(cols.map((c) => esc(r[c])).join(\",\")));\n    return lines.join(\"\\r\\n\");\n  }\n\n  triggerDownload(applicableBrands, selectedBrands, selectedEvent) {\n    const rows = this.buildSkuRows(applicableBrands, selectedBrands, selectedEvent);\n    const csv = \"\\uFEFF\" + this.toCsv(rows);\n    const blob = new Blob([csv], { type: \"text/csv;charset=utf-8;\" });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url;\n    a.download = \"Indent_Data_\" + selectedEvent + \"_\" + selectedBrands.join(\"-\").replace(/\\s+/g, \"\") + \".csv\";\n    document.body.appendChild(a);\n    a.click();\n    document.body.removeChild(a);\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  }\n\n  // Each indent belongs to exactly one brand, drawn from the applicable set.\n  rowBrands(ab, i) {\n    if (ab.length === 0) return [];\n    return [ab[i % ab.length]];\n  }\n\n  inr(n) { return \"₹\" + n.toLocaleString(\"en-IN\"); }\n\n  radioStyle(selected) {\n    return \"flex: none; width: 20px; height: 20px; border-radius: 999px; border: 2px solid \" +\n      (selected ? \"var(--reliance-base)\" : \"var(--stroke-heavy)\") +\n      \"; display: flex; align-items: center; justify-content: center;\";\n  }\n  boxStyle(selected) {\n    return \"flex: none; width: 20px; height: 20px; border-radius: 6px; display: flex; align-items: center; justify-content: center; border: 2px solid \" +\n      (selected ? \"var(--reliance-base)\" : \"var(--stroke-heavy)\") +\n      \"; background: \" + (selected ? \"var(--reliance-base)\" : \"transparent\") + \";\";\n  }\n  filterBtnStyle(active) {\n    return \"cursor: pointer; background: var(--surface-minimal); height: 48px; padding: 0 16px; min-width: 220px; display: flex; align-items: center; justify-content: space-between; gap: 14px; border-radius: var(--radius-component-m); border: \" +\n      (active ? \"2px solid var(--reliance-base)\" : \"1px solid var(--stroke-moderate)\") + \";\";\n  }\n  tabStyle(active) {\n    return \"all: unset; cursor: pointer; padding: 8px 20px; border-radius: 999px; font-size: 15px; font-weight: var(--w-label-high); color: \" +\n      (active ? \"#fff\" : \"var(--content-moderate)\") + \"; background: \" +\n      (active ? \"var(--reliance-base)\" : \"transparent\") + \";\";\n  }\n\n  renderVals() {\n    const { screen, view, open, sheet, selectedEvent, query } = this.state;\n    const applicableBrands = this.brandsForEvent(selectedEvent);\n    const selectedBrands = this.state.selectedBrands.filter((b) => applicableBrands.includes(b));\n    const brandCount = selectedBrands.length;\n\n    const eventItems = this.EVENTS.map((name) => ({\n      name,\n      selected: name === selectedEvent,\n      weight: name === selectedEvent ? 700 : 500,\n      radioStyle: this.radioStyle(name === selectedEvent),\n      onSelect: () => this.setState({ selectedEvent: name, selectedBrands: [], query: \"\", open: null, sheet: null, page: 1, visibleCount: this.MOBILE_STEP }),\n    }));\n\n    const brandItems = applicableBrands.map((name) => {\n      const selected = selectedBrands.includes(name);\n      return {\n        name,\n        selected,\n        boxStyle: this.boxStyle(selected),\n        onToggle: () => this.setState((s) => ({\n          selectedBrands: s.selectedBrands.includes(name)\n            ? s.selectedBrands.filter((b) => b !== name)\n            : [...s.selectedBrands, name],\n          page: 1,\n          visibleCount: this.MOBILE_STEP,\n        })),\n      };\n    });\n\n    const brandChips = selectedBrands.map((name) => ({\n      name,\n      onRemove: () => this.setState((s) => ({ selectedBrands: s.selectedBrands.filter((b) => b !== name), page: 1, visibleCount: this.MOBILE_STEP })),\n    }));\n\n    // Build indent rows (only meaningful once brands are chosen).\n    let rows = [];\n    if (brandCount > 0) {\n      const q = query.trim().toLowerCase();\n      rows = this.PEOPLE\n        .map((p, i) => ({ ...p, brands: this.rowBrands(applicableBrands, i) }))\n        .filter((r) => r.brands.some((b) => selectedBrands.includes(b)))\n        .filter((r) => !q || (r.name + \" (\" + r.role + \")\").toLowerCase().includes(q))\n        .map((r, idx) => ({\n          who: r.name + \" (\" + r.role + \")\",\n          mobile: r.mobile,\n          indentId: selectedEvent + \"_\" + r.seq,\n          date: r.date,\n          brandsLabel: r.brands.join(\", \"),\n          qty: r.qty,\n          mrp: this.inr(r.mrp),\n          bgStyle: idx % 2 === 1 ? \"var(--surface-subtle)\" : \"var(--surface-minimal)\",\n        }));\n    }\n\n    const total = rows.length;\n\n    // Desktop pagination\n    const pageCount = Math.max(1, Math.ceil(total / this.PAGE_SIZE));\n    const page = Math.min(this.state.page, pageCount);\n    const pageStart = (page - 1) * this.PAGE_SIZE;\n    const pageRows = rows.slice(pageStart, pageStart + this.PAGE_SIZE);\n    const pageItems = [];\n    for (let p = 1; p <= pageCount; p++) {\n      pageItems.push({\n        n: p,\n        current: p === page,\n        style: \"all: unset; cursor: pointer; min-width: 38px; height: 38px; padding: 0 10px; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 15px; font-feature-settings: 'tnum'; font-weight: \" +\n          (p === page ? \"var(--w-label-high)\" : \"400\") + \"; color: \" +\n          (p === page ? \"#fff\" : \"var(--content-heavy)\") + \"; background: \" +\n          (p === page ? \"var(--reliance-base)\" : \"transparent\") + \"; border: 1px solid \" +\n          (p === page ? \"var(--reliance-base)\" : \"var(--stroke-moderate)\") + \";\",\n        onClick: () => this.setState({ page: p }),\n      });\n    }\n    const navBtnStyle = (disabled) =>\n      \"all: unset; cursor: \" + (disabled ? \"default\" : \"pointer\") + \"; height: 38px; padding: 0 14px; display: inline-flex; align-items: center; gap: 6px; border-radius: 8px; font-size: 15px; font-weight: var(--w-label-high); border: 1px solid var(--stroke-moderate); color: \" +\n      (disabled ? \"var(--content-minimal)\" : \"var(--content-heavy)\") + \"; opacity: \" + (disabled ? \"0.5\" : \"1\") + \";\";\n\n    // Mobile lazy-load window\n    const visibleCount = Math.min(this.state.visibleCount, total);\n    const visibleRows = rows.slice(0, visibleCount);\n    const hasMore = visibleCount < total;\n\n    let brandLabel;\n    if (brandCount === 0) brandLabel = \"All brands\";\n    else if (brandCount === 1) brandLabel = selectedBrands[0];\n    else brandLabel = brandCount + \" brands selected\";\n\n    return {\n      // screen routing (menu entry point -> indents)\n      screenIsMenu: screen === \"menu\",\n      showDesktopIndents: screen === \"indents\" && view === \"desktop\",\n      showMobileIndents: screen === \"indents\" && view === \"mobile\",\n      goIndents: () => this.setState({ screen: \"indents\" }),\n      goMenu: () => this.setState({ screen: \"menu\", open: null, sheet: null }),\n      menuFrameStyle: (view === \"desktop\"\n        ? \"width: 460px; height: 768px; border-radius: 20px;\"\n        : \"width: 390px; height: 844px; border-radius: 28px;\") +\n        \" background: var(--surface-minimal); box-shadow: var(--shadow-elevated-high); overflow: hidden; display: flex; flex-direction: column; position: relative;\",\n\n      isDesktop: view === \"desktop\",\n      isMobile: view === \"mobile\",\n      showDesktop: () => this.setState({ view: \"desktop\", open: null, sheet: null }),\n      showMobile: () => this.setState({ view: \"mobile\", open: null, sheet: null }),\n      desktopTabStyle: this.tabStyle(view === \"desktop\"),\n      mobileTabStyle: this.tabStyle(view === \"mobile\"),\n\n      selectedEvent,\n      eventItems,\n      brandItems,\n      brandChips,\n      brandLabel,\n      hasBrandSel: brandCount > 0,\n      brandValueColor: brandCount === 0 ? \"var(--content-minimal)\" : \"var(--content-heavy)\",\n      brandCountSuffix: brandCount > 0 ? \" (\" + brandCount + \")\" : \"\",\n\n      // results\n      showResults: brandCount > 0,\n      noBrandYet: brandCount === 0,\n      rows,\n      pageRows,\n      visibleRows,\n      total,\n      noMatch: brandCount > 0 && rows.length === 0,\n      // desktop pagination\n      showPagination: total > this.PAGE_SIZE,\n      pageItems,\n      pageRangeLabel: total === 0 ? \"\" : (pageStart + 1) + \"–\" + Math.min(pageStart + this.PAGE_SIZE, total) + \" of \" + total,\n      prevStyle: navBtnStyle(page <= 1),\n      nextStyle: navBtnStyle(page >= pageCount),\n      goPrev: () => this.setState((s) => ({ page: Math.max(1, s.page - 1) })),\n      goNext: () => this.setState((s) => ({ page: Math.min(pageCount, s.page + 1) })),\n      // mobile lazy-load\n      mobileCountLabel: total === 0 ? \"\" : \"Showing \" + visibleCount + \" of \" + total,\n      hasMore,\n      onMobileScroll: (e) => {\n        const el = e.target;\n        if (el.scrollHeight - el.scrollTop - el.clientHeight < 120) {\n          this.setState((s) => (s.visibleCount >= total ? null : { visibleCount: s.visibleCount + this.MOBILE_STEP }));\n        }\n      },\n      query,\n      onSearch: (e) => this.setState({ query: e.target.value, page: 1, visibleCount: this.MOBILE_STEP }),\n      download: () => { try { this.triggerDownload(applicableBrands, selectedBrands, selectedEvent); } catch (e) { console.error(e); } },\n\n      eventOpen: open === \"event\",\n      brandOpen: open === \"brand\",\n      toggleEvent: () => this.setState((s) => ({ open: s.open === \"event\" ? null : \"event\" })),\n      toggleBrand: () => this.setState((s) => ({ open: s.open === \"brand\" ? null : \"brand\" })),\n      eventBtnStyle: this.filterBtnStyle(open === \"event\"),\n      brandBtnStyle: this.filterBtnStyle(open === \"brand\"),\n      eventChevStyle: \"display: flex; color: var(--content-moderate); transition: transform 150ms; transform: rotate(\" + (open === \"event\" ? \"180deg\" : \"0deg\") + \");\",\n      brandChevStyle: \"display: flex; color: var(--content-moderate); transition: transform 150ms; transform: rotate(\" + (open === \"brand\" ? \"180deg\" : \"0deg\") + \");\",\n\n      sheetOpen: sheet !== null,\n      eventSheetOpen: sheet === \"event\",\n      brandSheetOpen: sheet === \"brand\",\n      openEventSheet: () => this.setState({ sheet: \"event\" }),\n      openBrandSheet: () => this.setState({ sheet: \"brand\" }),\n\n      clearBrands: () => this.setState({ selectedBrands: [], page: 1, visibleCount: this.MOBILE_STEP }),\n      closeMenus: () => this.setState({ open: null, sheet: null }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
